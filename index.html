<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT Study Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f8f9fa; font-size: 16px; }
        .calendar-day { padding: 5px; border: 1px solid #ddd; min-height: 60px; text-align: center; font-size: 0.9rem; }
        .current-day { background: #007bff; color: white; }
        .completed-day { background: #28a745; color: white; }
        .disabled-day { background: #e9ecef; color: #6c757d; }
        .input-section { margin: 20px 0; }
        .input-section input, .input-section button { font-size: 1.2rem; padding: 10px; height: 48px; }
        .nav-btn { font-size: 1.2rem; padding: 10px 20px; }
        .undo-btn { font-size: 0.8rem; padding: 2px 5px; }
        .calendar-container { overflow-y: auto; max-height: 70vh; }
        @media (min-width: 768px) {
            .calendar-day { min-height: 80px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container py-3">
        <h1 class="h3 text-center my-3">SAT Study Planner</h1>
        <div class="d-flex justify-content-between mb-3">
            <button id="prevMonth" class="btn btn-outline-primary nav-btn">← Prev</button>
            <button id="todayBtn" class="btn btn-outline-primary nav-btn">Today</button>
            <button id="nextMonth" class="btn btn-outline-primary nav-btn">Next →</button>
        </div>
        <div class="calendar-container">
            <h2 id="monthYear" class="text-center"></h2>
            <div id="calendar" class="row row-cols-7 g-1"></div>
        </div>
        <div class="input-section">
            <h3>Log Pages Studied</h3>
            <div class="input-group mb-3">
                <input type="number" id="pagesInput" class="form-control" placeholder="Pages today" min="0" autofocus>
                <button id="submitPages" class="btn btn-primary">Submit</button>
            </div>
            <button id="undoLast" class="btn btn-outline-danger mb-3">Undo Last Entry</button>
            <p>Total Pages Studied: <span id="totalPages">0</span>/763</p>
            <p>Pages Remaining: <span id="pagesRemaining">763</span></p>
            <p>Current Plan: <span id="currentPlan"></span></p>
        </div>
        <footer class="text-center mt-4">
            <p>Goal: 763 pages by March 3, 2025</p>
        </footer>
    </div>
    <script>
        let currentDate = new Date(2025, 5, 12); // June 12, 2025
        let totalPages = 0;
        let pagesRemaining = 763;
        let studyPlan = { summerPages: 8, schoolPages: 1, weekendPages: 3 };
        let progress = JSON.parse(localStorage.getItem('satProgress')) || {};
        let entryLog = JSON.parse(localStorage.getItem('satEntryLog')) || []; // Track entries for undo

        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            const monthYear = document.getElementById('monthYear');
            calendar.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            monthYear.textContent = `${currentDate.toLocaleString('default', { month: 'long' })} ${year}`;

            // Weekday headers
            const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            daysOfWeek.forEach(day => {
                calendar.innerHTML += `<div class="col calendar-day fw-bold">${day}</div>`;
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) {
                calendar.innerHTML += '<div class="col calendar-day"></div>';
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const isBeforeStart = date < new Date(2025, 5, 13);
                const isSummer = date < new Date(2025, 7, 13);
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                const pages = isBeforeStart ? 0 : isSummer ? studyPlan.summerPages : (isWeekend ? studyPlan.weekendPages : studyPlan.schoolPages);
                const isCurrent = date.toDateString() === new Date(2025, 5, 12).toDateString();
                const isCompleted = progress[date.toDateString()];
                calendar.innerHTML += `
                    <div class="col calendar-day ${isCurrent ? 'current-day' : ''} ${isCompleted ? 'completed-day' : ''} ${isBeforeStart ? 'disabled-day' : ''}">
                        ${day}<br>${pages} pages
                        ${isCompleted ? `<br><button class="btn btn-outline-light btn-sm undo-btn" data-date="${date.toDateString()}">Undo</button>` : ''}
                    </div>`;
            }
            updatePlan();
            attachUndoListeners();
        }

        function updatePlan() {
            document.getElementById('totalPages').textContent = totalPages;
            document.getElementById('pagesRemaining').textContent = pagesRemaining;
            document.getElementById('currentPlan').textContent = `Summer: ${studyPlan.summerPages} pages/day, School: 1 page/day, Weekends: ${studyPlan.weekendPages} pages/day`;
            localStorage.setItem('satProgress', JSON.stringify(progress));
            localStorage.setItem('satEntryLog', JSON.stringify(entryLog));
        }

        function recalculatePlan() {
            const today = new Date(currentDate);
            const summerEnd = new Date(2025, 7, 12);
            const endDate = new Date(2025, 2, 3);
            let summerDays = Math.max(0, Math.ceil((summerEnd - today) / (1000 * 60 * 60 * 24)));
            let schoolDays = 143, weekendDays = 58;
            if (today >= summerEnd) {
                summerDays = 0;
                const remainingDays = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
                schoolDays = Math.round(remainingDays * 5 / 7);
                weekendDays = remainingDays - schoolDays;
            }
            if (pagesRemaining <= 0) {
                alert('Congratulations! You’ve completed the 763 pages!');
                return;
            }
            const schoolPages = summerDays > 0 ? 143 : schoolDays;
            const y = Math.ceil((pagesRemaining - schoolPages) / (weekendDays + summerDays));
            studyPlan.weekendPages = Math.max(3, y);
            studyPlan.summerPages = summerDays > 0 ? studyPlan.weekendPages : studyPlan.summerPages;
            renderCalendar();
        }

        function attachUndoListeners() {
            document.querySelectorAll('.undo-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const date = btn.dataset.date;
                    const pages = progress[date] || 0;
                    totalPages -= pages;
                    pagesRemaining = Math.min(763, 763 - totalPages);
                    delete progress[date];
                    entryLog = entryLog.filter(entry => entry.date !== date);
                    recalculatePlan();
                });
            });
        }

        document.getElementById('submitPages').addEventListener('click', () => {
            const pages = parseInt(document.getElementById('pagesInput').value) || 0;
            if (pages < 0) {
                alert('Please enter a valid number of pages.');
                return;
            }
            totalPages += pages;
            pagesRemaining = Math.max(0, 763 - totalPages);
            const today = new Date(2025, 5, 12).toDateString(); // Simulate today
            progress[today] = (progress[today] || 0) + pages;
            entryLog.push({ date: today, pages });
            document.getElementById('pagesInput').value = '';
            recalculatePlan();
        });

        document.getElementById('undoLast').addEventListener('click', () => {
            if (entryLog.length === 0) {
                alert('No entries to undo.');
                return;
            }
            const lastEntry = entryLog.pop();
            totalPages -= lastEntry.pages;
            pagesRemaining = Math.min(763, 763 - totalPages);
            progress[lastEntry.date] = (progress[lastEntry.date] || 0) - lastEntry.pages;
            if (progress[lastEntry.date] <= 0) delete progress[lastEntry.date];
            recalculatePlan();
        });

        document.getElementById('prevMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        document.getElementById('nextMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        document.getElementById('todayBtn').addEventListener('click', () => {
            currentDate = new Date(2025, 5, 12); // Reset to today
            renderCalendar();
        });

        // Swipe support
        let touchStartX = 0;
        document.querySelector('.calendar-container').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });
        document.querySelector('.calendar-container').addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) document.getElementById('nextMonth').click();
            if (touchEndX > touchStartX + 50) document.getElementById('prevMonth').click();
        });

        renderCalendar();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
