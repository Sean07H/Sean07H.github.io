<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Maps Website</title>
  <!-- Load Leaflet.js (OpenStreetMap) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Load Mapbox GL JS (optional, as fallback) -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }
    #map {
      width: 100%;
      height: 50%;
    }
    #sidebar {
      width: 100%;
      height: 50%;
      overflow-y: auto;
      padding: 10px;
      box-sizing: border-box;
      background-color: #f8f9fa;
    }
    #sidebar input, #sidebar button {
      width: 90%;
      margin: 5px auto;
      padding: 8px;
      display: block;
      font-size: 16px;
      box-sizing: border-box;
    }
    #quick-options {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    #quick-options button {
      width: 48%;
      margin: 5px 1%;
      padding: 8px;
      font-size: 14px;
    }
    #results {
      margin-top: 10px;
      font-size: 14px;
    }
    /* Mobile optimization */
    @media (max-width: 600px) {
      #map {
        height: 40%;
      }
      #sidebar {
        height: 60%;
      }
      #quick-options button {
        width: 48%;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="sidebar">
    <input type="text" id="search-input" placeholder="Search for places...">
    <button onclick="searchPlaces()">Search</button>
    <div id="quick-options">
      <button onclick="goToPlace('home')">Home</button>
      <button onclick="goToPlace('school')">School</button>
      <button onclick="goToPlace('secondary school')">Secondary School</button>
      <button onclick="searchNearby('fast_food')">Fast Food</button>
      <button onclick="searchNearby('restaurant')">Restaurants</button>
      <button onclick="searchNearby('gas_station')">Gas Stations</button>
    </div>
    <button onclick="getCurrentLocation()">Center on Current Location</button>
    <button onclick="toggleMapType('roadmap')">Roadmap View</button>
    <button onclick="toggleMapType('satellite')">Satellite View</button>
    <button onclick="zoomToStreetLevel()">Street-Level Zoom</button>
    <div id="results"></div>
  </div>

  <script>
    // Try Mapbox first, fall back to Leaflet
    let map, currentLocation, useMapbox = true;
    const mapboxToken = 'pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4NXVycTA2emYycXBndHRqcmZ3N3gifQ.rJcFIG214AriISLbB5xWOw';

    // Initialize map
    function initMap() {
      if (useMapbox && typeof mapboxgl !== 'undefined') {
        try {
          mapboxgl.accessToken = mapboxToken;
          map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/streets-v12',
            center: [-74.0060, 40.7128], // New York
            zoom: 12
          });
          map.addControl(new mapboxgl.NavigationControl());
          map.addControl(new mapboxgl.GeolocateControl({
            positionOptions: { enableHighAccuracy: true },
            trackUserLocation: true,
            showUserHeading: true
          }).on('geolocate', (e) => {
            currentLocation = [e.coords.longitude, e.coords.latitude];
            new mapboxgl.Marker().setLngLat(currentLocation).addTo(map);
          }));
        } catch (e) {
          console.error('Mapbox failed:', e);
          useMapbox = false;
          initLeaflet();
        }
      } else {
        initLeaflet();
      }
    }

    // Initialize Leaflet as fallback
    function initLeaflet() {
      map = L.map('map').setView([40.7128, -74.0060], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }).addTo(map);
      // Add geolocation
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            currentLocation = [position.coords.latitude, position.coords.longitude];
            L.marker(currentLocation).addTo(map).bindPopup('Your Location').openPopup();
            map.setView(currentLocation, 12);
          },
          () => alert('Location access denied. Please enable location services.')
        );
      }
    }

    // Predefined places
    const predefinedPlaces = {
      'home': [-74.0060, 40.7128], // Replace with your coordinates
      'school': [-73.935242, 40.730610],
      'secondary school': [-73.925242, 40.740610]
    };

    // Go to predefined place
    function goToPlace(type) {
      const coords = predefinedPlaces[type];
      if (useMapbox) {
        map.flyTo({ center: coords, zoom: 14 });
        new mapboxgl.Marker()
          .setLngLat(coords)
          .setPopup(new mapboxgl.Popup().setText(type.charAt(0).toUpperCase() + type.slice(1)))
          .addTo(map)
          .togglePopup();
      } else {
        map.setView(coords, 14);
        L.marker(coords)
          .addTo(map)
          .bindPopup(type.charAt(0).toUpperCase() + type.slice(1))
          .openPopup();
      }
    }

    // Search places (using Mapbox Geocoding or Nominatim for Leaflet)
    function searchPlaces() {
      const query = document.getElementById('search-input').value;
      if (!query) {
        alert('Please enter a search query.');
        return;
      }
      if (useMapbox) {
        fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${mapboxToken}&proximity=${currentLocation ? currentLocation.join(',') : '-74.0060,40.7128'}`)
          .then(response => response.json())
          .then(data => {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            if (data.features && data.features.length > 0) {
              data.features.forEach(feature => {
                const placeDiv = document.createElement('div');
                place petrol = `Directions to ${feature.place_name}`;
                placeDiv.innerHTML = `${feature.place_name} <button onclick="showDirections([${feature.center}])">Directions</button>`;
                resultsDiv.appendChild(placeDiv);
                if (useMapbox) {
                  new mapboxgl.Marker()
                    .setLngLat(feature.center)
                    .setPopup(new mapboxgl.Popup().setText(feature.place_name))
                    .addTo(map)
                    .togglePopup();
                }
              });
              map.flyTo({ center: data.features[0].center, zoom: 14 });
            } else {
              resultsDiv.innerHTML = 'No results found.';
            }
          })
          .catch(error => {
            console.error('Search error:', error);
            alert('Search failed. Trying OpenStreetMap...');
            searchWithNominatim(query);
          });
      } else {
        searchWithNominatim(query);
      }
    }

    // Search with Nominatim (OpenStreetMap)
    function searchWithNominatim(query) {
      fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5`)
        .then(response => response.json())
        .then(data => {
          const resultsDiv = document.getElementById('results');
          resultsDiv.innerHTML = '';
          if (data && data.length > 0) {
            data.forEach(place => {
              const coords = [parseFloat(place.lat), parseFloat(place.lon)];
              const placeDiv = document.createElement('div');
              placeDiv.innerHTML = `${place.display_name} <button onclick="showDirections([${coords}])">Directions</button>`;
              resultsDiv.appendChild(placeDiv);
              L.marker(coords)
                .addTo(map)
                .bindPopup(place.display_name)
                .openPopup();
            });
            map.setView([data[0].lat, data[0].lon], 14);
          } else {
            resultsDiv.innerHTML = 'No results found.';
          }
        })
        .catch(error => {
          console.error('Nominatim error:', error);
          alert('Search failed. Please check your internet connection and try again.');
        });
    }

    // Search nearby places
    function searchNearby(type) {
      if (!currentLocation) {
        alert('Please enable location to search nearby places.');
        return;
      }
      const query = type === 'fast_food' ? 'fast food' : type;
      if (useMapbox) {
        fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${mapboxToken}&proximity=${currentLocation.join(',')}&type=poi`)
          .then(response => response.json())
          .then(data => {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            if (data.features && data.features.length > 0) {
              data.features.forEach(feature => {
                const placeDiv = document.createElement('div');
                placeDiv.innerHTML = `${feature.place_name} <button onclick="showDirections([${feature.center}])">Directions</button>`;
                resultsDiv.appendChild(placeDiv);
                if (useMapbox) {
                  new mapboxgl.Marker()
                    .setLngLat(feature.center)
                    .setPopup(new mapboxgl.Popup().setText(feature.place_name))
                    .addTo(map)
                    .togglePopup();
                }
              });
            } else {
              resultsDiv.innerHTML = 'No nearby places found.';
            }
          })
          .catch(error => {
            console.error('Nearby search error:', error);
            alert('Nearby search failed. Trying OpenStreetMap...');
            searchNearbyWithNominatim(query);
          });
      } else {
        searchNearbyWithNominatim(query);
      }
    }

    // Nearby search with Nominatim
    function searchNearbyWithNominatim(query) {
      fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&bounded=1&viewbox=${currentLocation[1]-0.05},${currentLocation[0]-0.05},${currentLocation[1]+0.05},${currentLocation[0]+0.05}`)
        .then(response => response.json())
        .then(data => {
          const resultsDiv = document.getElementById('results');
          resultsDiv.innerHTML = '';
          if (data && data.length > 0) {
            data.forEach(place => {
              const coords = [parseFloat(place.lat), parseFloat(place.lon)];
              const placeDiv = document.createElement('div');
              placeDiv.innerHTML = `${place.display_name} <button onclick="showDirections([${coords}])">Directions</button>`;
              resultsDiv.appendChild(placeDiv);
              L.marker(coords)
                .addTo(map)
                .bindPopup(place.display_name)
                .openPopup();
            });
          } else {
            resultsDiv.innerHTML = 'No nearby places found.';
          }
        })
        .catch(error => {
          console.error('Nominatim nearby error:', error);
          alert('Nearby search failed. Please check your internet connection.');
        });
    }

    // Show directions and ETA (using Mapbox Directions or simple Leaflet path)
    function showDirections(destination) {
      if (!currentLocation) {
        alert('Please enable location to get directions.');
        return;
      }
      if (useMapbox) {
        const directions = new MapboxDirections({
          accessToken: mapboxToken,
          unit: 'metric',
          profile: 'mapbox/driving',
          controls: { inputs: false }
        });
        map.addControl(directions);
        directions.setOrigin(currentLocation);
        directions.setDestination(destination);
        directions.on('route', (e) => {
          const route = e.route[0];
          document.getElementById('results').innerHTML = `ETA: ${Math.round(route.duration / 60)} minutes, Distance: ${(route.distance / 1000).toFixed(2)} km`;
        });
      } else {
        // Simple Leaflet polyline (no ETA, as Nominatim doesn't provide routing)
        const route = [currentLocation, destination];
        L.polyline(route, { color: 'blue' }).addTo(map);
        map.fitBounds(route);
        document.getElementById('results').innerHTML = 'Route drawn (ETA not available with OpenStreetMap).';
      }
    }

    // Center on current location
    function getCurrentLocation() {
      if (currentLocation) {
        if (useMapbox) {
          map.flyTo({ center: currentLocation, zoom: 14 });
        } else {
          map.setView(currentLocation, 14);
        }
      } else {
        alert('Location not available. Please enable location services.');
      }
    }

    // Toggle map type
    function toggleMapType(type) {
      if (useMapbox) {
        map.setStyle(`mapbox://styles/mapbox/${type === 'roadmap' ? 'streets-v12' : 'satellite-v9'}`);
        map.on('styledata', () => {
          if (currentLocation) {
            new mapboxgl.Marker().setLngLat(currentLocation).addTo(map);
          }
        });
      } else {
        const tileUrl = type === 'roadmap'
          ? 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
          : 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';
        map.eachLayer(layer => {
          if (layer instanceof L.TileLayer) map.removeLayer(layer);
        });
        L.tileLayer(tileUrl, {
          attribution: type === 'roadmap' ? '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>' : '&copy; Esri'
        }).addTo(map);
      }
    }

    // Street-level zoom
    function zoomToStreetLevel() {
      if (currentLocation) {
        if (useMapbox) {
          map.flyTo({ center: currentLocation, zoom: 18 });
        } else {
          map.setView(currentLocation, 18);
        }
      } else {
        if (useMapbox) {
          map.setZoom(18);
        } else {
          map.setZoom(18);
        }
      }
    }

    // Initialize map on load
    initMap();
  </script>
</body>
</html>
