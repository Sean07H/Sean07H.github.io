<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AstroMap</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://ofrohn.github.io/files/celestial.min.js"></script>
  <script src="https://aladin.u-strasbg.fr/AladinLite/api/v3/latest/aladin.min.js" defer></script>
</head>
<body>
  <header>
    <h1>AstroMap</h1>
    <p>Explore stars, constellations, galaxies, and deep sky surveys in one powerful interface.</p>
  </header>
  <main>
    <div id="sky-container"></div>

    <section id="controls">
      <label>Survey:
        <select id="survey-select">
          <option value="P/DSS2/color">DSS (Optical)</option>
          <option value="P/2MASS/color">2MASS (Infrared)</option>
          <option value="P/AllWISE/color">AllWISE</option>
        </select>
      </label>

      <label>Magnitude Limit:
        <input type="range" id="mag-slider" min="1" max="8" step="0.1" value="6" />
        <span id="mag-value">6</span>
      </label>

      <label>Time:
        <input type="datetime-local" id="time-picker" />
      </label>
    </section>

    <div id="aladin-lite"></div>
  </main>

  <script src="main.js"></script>
</body>
</html>
