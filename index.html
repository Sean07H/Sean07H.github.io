<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Decoder Alpha</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 400px; margin: 20px auto; }
        button { padding: 20px; font-size: 1.1rem; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .box-btn { background: #444; color: white; }
        .box-btn:active { background: #007bff; }
        .pitch-btn { padding: 15px; margin: 5px; font-weight: bold; }
        .fastball { background: #ff4757; }
        .offspeed { background: #2ed573; }
        #log { background: #333; padding: 10px; height: 100px; overflow-y: scroll; margin-top: 20px; font-family: monospace; }
        .prediction-box { font-size: 1.5rem; margin: 20px; padding: 15px; border: 2px solid #007bff; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>Pitch Decoder</h1>
    
    <div class="prediction-box">
        Prediction: <span id="prediction">Waiting for data...</span>
    </div>

    <div class="grid">
        <button class="box-btn" onclick="recordTouch(1)">1. Hat</button>
        <button class="box-btn" onclick="recordTouch(2)">2. Face</button>
        <button class="box-btn" onclick="recordTouch(3)">3. Chest</button>
        <button class="box-btn" onclick="recordTouch(4)">4. L-Arm</button>
        <button class="box-btn" onclick="recordTouch(5)">5. R-Arm</button>
        <button class="box-btn" onclick="recordTouch(6)">6. Belt</button>
        <button class="box-btn" onclick="recordTouch(7)">7. L-Thigh</button>
        <button class="box-btn" onclick="recordTouch(8)">8. R-Thigh</button>
    </div>

    <hr>
    <h3>What was the result?</h3>
    <button class="pitch-btn fastball" onclick="submitResult('Fastball')">FASTBALL</button>
    <button class="pitch-btn offspeed" onclick="submitResult('Offspeed')">OFFSPEED</button>

    <div id="log">--- Sequence Log ---</div>

    <script>
        let currentSequence = [];
        let history = []; // Stores { sequence: [], result: "" }

        function recordTouch(id) {
            currentSequence.push(id);
            updateLog(`Touch: ${id}`);
            predictNext();
        }

        function submitResult(pitch) {
            if (currentSequence.length === 0) return;
            
            history.push({
                sequence: [...currentSequence],
                result: pitch
            });
            
            updateLog(`Result: ${pitch} recorded.`);
            currentSequence = []; // Reset for next pitch
        }

        function predictNext() {
            if (history.length < 2 || currentSequence.length === 0) return;

            const lastTouch = currentSequence[currentSequence.length - 1];
            let fastballCount = 0;
            let offspeedCount = 0;

            // Simple Pattern Matcher: Look for sequences where the 
            // current last touch was followed by a specific pitch.
            history.forEach(entry => {
                if (entry.sequence.includes(lastTouch)) {
                    if (entry.result === "Fastball") fastballCount++;
                    else offspeedCount++;
                }
            });

            const predElement = document.getElementById('prediction');
            if (fastballCount > offspeedCount) {
                predElement.innerText = "FASTBALL EXPECTED";
                predElement.style.color = "#ff4757";
            } else if (offspeedCount > fastballCount) {
                predElement.innerText = "OFFSPEED EXPECTED";
                predElement.style.color = "#2ed573";
            } else {
                predElement.innerText = "Analyzing...";
            }
        }

        function updateLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML += `<div>${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
