<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Maps Website</title>
  <!-- Load Mapbox GL JS -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" rel="stylesheet">
  <!-- Load Mapbox GL Directions plugin -->
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.3.1/mapbox-gl-directions.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.3.1/mapbox-gl-directions.css" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }
    #map {
      width: 100%;
      height: 60%;
    }
    #sidebar {
      width: 100%;
      height: 40%;
      overflow-y: auto;
      padding: 10px;
      box-sizing: border-box;
      background-color: #f8f9fa;
    }
    #sidebar input, #sidebar button {
      width: 90%;
      margin: 5px auto;
      padding: 8px;
      display: block;
      font-size: 16px;
    }
    #quick-options {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    #quick-options button {
      width: 48%;
      margin: 5px 1%;
      padding: 8px;
      font-size: 14px;
    }
    #results {
      margin-top: 10px;
    }
    /* Ensure responsiveness for mobile */
    @media (max-width: 600px) {
      #map {
        height: 50%;
      }
      #sidebar {
        height: 50%;
      }
      #quick-options button {
        width: 48%;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="sidebar">
    <input type="text" id="search-input" placeholder="Search for places...">
    <button onclick="searchPlaces()">Search</button>
    <div id="quick-options">
      <button onclick="goToPlace('home')">Home</button>
      <button onclick="goToPlace('school')">School</button>
      <button onclick="goToPlace('secondary school')">Secondary School</button>
      <button onclick="searchNearby('fast_food')">Fast Food</button>
      <button onclick="searchNearby('restaurant')">Restaurants</button>
      <button onclick="searchNearby('gas_station')">Gas Stations</button>
    </div>
    <button onclick="getCurrentLocation()">Center on Current Location</button>
    <button onclick="toggleMapType('streets-v12')">Roadmap View</button>
    <button onclick="toggleMapType('satellite-v9')">Satellite View</button>
    <button onclick="zoomToStreetLevel()">Street-Level Zoom</button>
    <div id="results"></div>
  </div>

  <script>
    // Mapbox access token (public, for demo purposes only)
    mapboxgl.accessToken = 'pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4NXVycTA2emYycXBndHRqcmZ3N3gifQ.rJcFIG214AriISLbB5xWOw';

    // Initialize map
    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/streets-v12',
      center: [-74.0060, 40.7128], // Default: New York
      zoom: 12
    });

    // Add navigation controls (zoom and rotation)
    map.addControl(new mapboxgl.NavigationControl());

    // Add geolocation control to track user location
    let currentLocation = null;
    map.addControl(
      new mapboxgl.GeolocateControl({
        positionOptions: { enableHighAccuracy: true },
        trackUserLocation: true,
        showUserHeading: true
      })
        .on('geolocate', (e) => {
          currentLocation = [e.coords.longitude, e.coords.latitude];
          new mapboxgl.Marker().setLngLat(currentLocation).addTo(map);
        })
    );

    // Add directions control
    const directions = new MapboxDirections({
      accessToken: mapboxgl.accessToken,
      unit: 'metric',
      profile: 'mapbox/driving',
      controls: { inputs: false } // We'll use custom inputs
    });
    map.addControl(directions, 'top-left');

    // Predefined places (replace with your coordinates)
    const predefinedPlaces = {
      'home': [-74.0060, 40.7128], // Example: New York
      'school': [-73.935242, 40.730610],
      'secondary school': [-73.925242, 40.740610]
    };

    // Go to predefined place
    function goToPlace(type) {
      const coords = predefinedPlaces[type];
      map.flyTo({ center: coords, zoom: 14 });
      new mapboxgl.Marker()
        .setLngLat(coords)
        .setPopup(new mapboxgl.Popup().setText(type.charAt(0).toUpperCase() + type.slice(1)))
        .addTo(map)
        .togglePopup();
    }

    // Search for places using Mapbox Geocoding API
    function searchPlaces() {
      const query = document.getElementById('search-input').value;
      fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${mapboxgl.accessToken}&proximity=${currentLocation ? currentLocation.join(',') : '-74.0060,40.7128'}`)
        .then(response => response.json())
        .then(data => {
          const resultsDiv = document.getElementById('results');
          resultsDiv.innerHTML = '';
          data.features.forEach(feature => {
            const placeDiv = document.createElement('div');
            placeDiv.innerHTML = `${feature.place_name} <button onclick="showDirections([${feature.center}])">Directions</button>`;
            resultsDiv.appendChild(placeDiv);
            new mapboxgl.Marker()
              .setLngLat(feature.center)
              .setPopup(new mapboxgl.Popup().setText(feature.place_name))
              .addTo(map)
              .togglePopup();
          });
          if (data.features.length > 0) {
            map.flyTo({ center: data.features[0].center, zoom: 14 });
          }
        })
        .catch(error => {
          alert('Error searching places: ' + error);
        });
    }

    // Search nearby places (fast food, restaurants, gas stations)
    function searchNearby(type) {
      if (!currentLocation) {
        alert('Please enable location to search nearby places.');
        return;
      }
      const query = type === 'fast_food' ? 'fast food' : type;
      fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${mapboxgl.accessToken}&proximity=${currentLocation.join(',')}&type=poi`)
        .then(response => response.json())
        .then(data => {
          const resultsDiv = document.getElementById('results');
          resultsDiv.innerHTML = '';
          data.features.forEach(feature => {
            const placeDiv = document.createElement('div');
            placeDiv.innerHTML = `${feature.place_name} <button onclick="showDirections([${feature.center}])">Directions</button>`;
            resultsDiv.appendChild(placeDiv);
            new mapboxgl.Marker()
              .setLngLat(feature.center)
              .setPopup(new mapboxgl.Popup().setText(feature.place_name))
              .addTo(map)
              .togglePopup();
          });
        })
        .catch(error => {
          alert('Error searching nearby places: ' + error);
        });
    }

    // Show directions and ETA
    function showDirections(destination) {
      if (!currentLocation) {
        alert('Please enable location to get directions.');
        return;
      }
      directions.setOrigin(currentLocation);
      directions.setDestination(destination);
      directions.on('route', (e) => {
        const route = e.route[0];
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = `ETA: ${Math.round(route.duration / 60)} minutes, Distance: ${(route.distance / 1000).toFixed(2)} km`;
      });
    }

    // Center on current location
    function getCurrentLocation() {
      if (currentLocation) {
        map.flyTo({ center: currentLocation, zoom: 14 });
      } else {
        alert('Location not available. Please enable location services.');
      }
    }

    // Toggle map style (roadmap or satellite)
    function toggleMapType(style) {
      map.setStyle(`mapbox://styles/mapbox/${style}`);
      // Re-add markers and directions after style change
      map.on('styledata', () => {
        if (currentLocation) {
          new mapboxgl.Marker().setLngLat(currentLocation).addTo(map);
        }
      });
    }

    // Simulate street-level zoom (Mapbox doesn't have Street View)
    function zoomToStreetLevel() {
      if (currentLocation) {
        map.flyTo({ center: currentLocation, zoom: 18 });
      } else {
        map.setZoom(18);
      }
    }
  </script>
</body>
</html>
