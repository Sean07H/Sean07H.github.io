<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT Study Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f8f9fa; font-size: 16px; }
        .calendar-day { padding: 10px; border: 1px solid #ddd; min-height: 60px; text-align: center; }
        .current-day { background: #007bff; color: white; }
        .completed-day { background: #28a745; color: white; }
        .week-view { margin: 20px 0; }
        .week-view li { font-size: 1.1rem; padding: 10px; }
        .input-section { margin: 20px 0; }
        .input-section input, .input-section button { font-size: 1.2rem; padding: 10px; height: 48px; }
        .nav-btn { font-size: 1.2rem; padding: 10px 20px; }
        .month-view { display: none; }
        @media (min-width: 768px) {
            .month-view { display: block; }
            .calendar-day { min-height: 100px; }
        }
        .swipe-container { overflow-x: auto; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container py-3">
        <h1 class="h3 text-center my-3">SAT Study Planner</h1>
        <div class="d-flex justify-content-between mb-3">
            <button id="prevWeek" class="btn btn-outline-primary nav-btn">← Prev</button>
            <button id="todayBtn" class="btn btn-outline-primary nav-btn">Today</button>
            <button id="nextWeek" class="btn btn-outline-primary nav-btn">Next →</button>
        </div>
        <button id="toggleView" class="btn btn-secondary mb-3 w-100">Show Monthly Calendar</button>
        <div id="monthView" class="month-view">
            <h2 id="monthYear" class="text-center"></h2>
            <div id="calendar" class="row row-cols-7 g-1"></div>
        </div>
        <div class="week-view swipe-container">
            <h3 id="weekRange" class="text-center"></h3>
            <ul id="weekList" class="list-group"></ul>
        </div>
        <div class="input-section">
            <h3>Log Pages Studied</h3>
            <div class="input-group mb-3">
                <input type="number" id="pagesInput" class="form-control" placeholder="Pages today" min="0">
                <button id="submitPages" class="btn btn-primary">Submit</button>
            </div>
            <p>Total Pages Studied: <span id="totalPages">0</span>/763</p>
            <p>Pages Remaining: <span id="pagesRemaining">763</span></p>
            <p>Current Plan: <span id="currentPlan"></span></p>
        </div>
        <footer class="text-center mt-4">
            <p>Goal: 763 pages by March 3, 2025</p>
        </footer>
    </div>
    <script>
        let currentDate = new Date(2025, 5, 12); // June 12, 2025
        let totalPages = 0;
        let pagesRemaining = 763;
        let studyPlan = { summerPages: 8, schoolPages: 1, weekendPages: 3 };
        let progress = JSON.parse(localStorage.getItem('satProgress')) || {};

        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            const monthYear = document.getElementById('monthYear');
            calendar.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            monthYear.textContent = `${currentDate.toLocaleString('default', { month: 'long' })} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) {
                calendar.innerHTML += '<div class="col calendar-day"></div>';
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                if (date < new Date(2025, 5, 13)) continue; // Start from June 13
                const isSummer = date < new Date(2025, 7, 13);
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                const pages = isSummer ? studyPlan.summerPages : (isWeekend ? studyPlan.weekendPages : studyPlan.schoolPages);
                const isCurrent = date.toDateString() === new Date(2025, 5, 12).toDateString();
                const isCompleted = progress[date.toDateString()];
                calendar.innerHTML += `
                    <div class="col calendar-day ${isCurrent ? 'current-day' : ''} ${isCompleted ? 'completed-day' : ''}">
                        ${day}<br>${pages} pages
                    </div>`;
            }
            renderWeek();
            updatePlan();
        }

        function renderWeek() {
            const weekList = document.getElementById('weekList');
            const weekRange = document.getElementById('weekRange');
            weekList.innerHTML = '';
            const startOfWeek = new Date(currentDate);
            startOfWeek.setDate(currentDate.getDate() - currentDate.getDay());
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);
            weekRange.textContent = `${startOfWeek.toLocaleDateString()} - ${endOfWeek.toLocaleDateString()}`;
            for (let i = 0; i < 7; i++) {
                const date = new Date(startOfWeek);
                date.setDate(startOfWeek.getDate() + i);
                if (date < new Date(2025, 5, 13)) continue;
                const isSummer = date < new Date(2025, 7, 13);
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                const pages = isSummer ? studyPlan.summerPages : (isWeekend ? studyPlan.weekendPages : studyPlan.schoolPages);
                const isCompleted = progress[date.toDateString()];
                weekList.innerHTML += `
                    <li class="list-group-item ${isCompleted ? 'completed-day' : ''}">
                        ${date.toLocaleDateString()}: Study ${pages} pages
                    </li>`;
            }
        }

        function updatePlan() {
            document.getElementById('totalPages').textContent = totalPages;
            document.getElementById('pagesRemaining').textContent = pagesRemaining;
            document.getElementById('currentPlan').textContent = `Summer: ${studyPlan.summerPages} pages/day, School: 1 pageabulary page/day, Weekends: ${studyPlan.weekendPages} pages/day`;
            localStorage.setItem('satProgress', JSON.stringify(progress));
        }

        function recalculatePlan() {
            const today = new Date(currentDate);
            const summerEnd = new Date(2025, 7, 12);
            const endDate = new Date(2025, 2, 3);
            let remainingDays = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
            let summerDays = Math.max(0, Math.ceil((summerEnd - today) / (1000 * 60 * 60 * 24)));
            let schoolDays = 143, weekendDays = 58;
            if (today >= summerEnd) {
                summerDays = 0;
                remainingDays = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
                schoolDays = Math.round(remainingDays * 5 / 7);
                weekendDays = remainingDays - schoolDays;
            }
            if (pagesRemaining <= 0) {
                alert('Congratulations! You’ve completed the 763 pages!');
                return;
            }
            const schoolPages = summerDays > 0 ? 143 : schoolDays;
            const y = Math.ceil((pagesRemaining - schoolPages) / (weekendDays + summerDays));
            studyPlan.weekendPages = Math.max(3, y);
            studyPlan.summerPages = summerDays > 0 ? studyPlan.weekendPages : studyPlan.summerPages;
            renderCalendar();
        }

        document.getElementById('submitPages').addEventListener('click', () => {
            const pages = parseInt(document.getElementById('pagesInput').value) || 0;
            if (pages < 0) {
                alert('Please enter a valid number of pages.');
                return;
            }
            totalPages += pages;
            pagesRemaining = Math.max(0, 763 - totalPages);
            progress[new Date(2025, 5, 12).toDateString()] = pages; // Simulate today
            recalculatePlan();
        });

        document.getElementById('prevWeek').addEventListener('click', () => {
            currentDate.setDate(currentDate.getDate() - 7);
            renderCalendar();
        });

        document.getElementById('nextWeek').addEventListener('click', () => {
            currentDate.setDate(currentDate.getDate() + 7);
            renderCalendar();
        });

        document.getElementById('todayBtn').addEventListener('click', () => {
            currentDate = new Date(2025, 5, 12); // Reset to today
            renderCalendar();
        });

        document.getElementById('toggleView').addEventListener('click', () => {
            const monthView = document.getElementById('monthView');
            const isMonthView = monthView.style.display === 'block';
            monthView.style.display = isMonthView ? 'none' : 'block';
            document.getElementById('toggleView').textContent = isMonthView ? 'Show Monthly Calendar' : 'Show Weekly List';
            renderCalendar();
        });

        // Swipe support
        let touchStartX = 0;
        document.querySelector('.swipe-container').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });
        document.querySelector('.swipe-container').addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) document.getElementById('nextWeek').click();
            if (touchEndX > touchStartX + 50) document.getElementById('prevWeek').click();
        });

        renderCalendar();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
