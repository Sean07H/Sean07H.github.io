<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>StarCam</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>StarCam</h1>
    <p>Take or upload a sky photo and see the stars, constellations, and planets naturally overlaid.</p>
  </header>

  <main>
    <div id="photo-section">
      <input type="file" id="photo-input" accept="image/*" capture="environment" />
      <canvas id="photo-canvas"></canvas>
    </div>

    <div id="info">
      <button id="get-overlay">Overlay Sky Data</button>
      <p id="status">Waiting for image and location...</p>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
