<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT Study Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .calendar-day { transition: all 0.2s ease; }
        .calendar-day:hover:not(.disabled-day):not(.header-day) { transform: scale(1.05); box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .dark .calendar-day.completed-day { background: #22c55e; position: relative; }
        .dark .calendar-day.current-day { background: #3b82f6; }
        .dark .calendar-day.selected-day { border-color: #facc15 !important; }
        .dark .disabled-day { background: #1f2937; color: #9ca3af; }
        .completed-day::after {
            content: '✔';
            position: absolute;
            top: 2px; right: 4px;
            font-size: 0.75rem;
            color: white;
        }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(31, 41, 55, 0.5); }
        .animate-slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .tooltip { position: relative; }
        .tooltip:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%; left: 50%; transform: translateX(-50%);
            background: #1f2937; color: white; padding: 4px 8px;
            border-radius: 4px; font-size: 0.75rem; white-space: nowrap;
            z-index: 10;
        }
        button:focus, .calendar-day:focus {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }
        .calendar-day span { display: block; }
        .calendar-day .pages-text { font-size: 0.75rem; color: inherit; }
        .dark { background: #000000; } /* Black background for dark mode */
        .dark .bg-gray-100 { background: #000000; }
        .dark .bg-white { background: #1f2937; } /* Darker calendar background */
        .dark .text-gray-900 { color: #f3f4f6; }
        @media (max-width: 640px) {
            .calendar-day { font-size: 0.75rem; padding: 0.5rem; }
            .calendar-day .pages-text { font-size: 0.6rem; }
            .calendar-day .undo-btn { font-size: 0.6rem; padding: 0.25rem 0.5rem; }
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">
    <div class="container mx-auto p-4 flex-grow">
        <header class="text-center mb-6 sticky top-0 z-10 glass p-4 rounded-lg">
            <img src="sat-logo.png" alt="SAT Study Planner Logo" class="w-32 mx-auto mb-2" loading="lazy">
            <h1 class="text-2xl font-bold">SAT Study Planner</h1>
            <button id="toggleDarkMode" class="mt-2 text-sm text-gray-600 dark:text-gray-400 hover:underline" aria-label="Toggle dark mode">Toggle Dark Mode</button>
        </header>
        <div class="flex justify-between mb-4 flex-wrap gap-2">
            <button id="prevMonth" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition tooltip" data-tooltip="Previous Month" aria-label="Previous Month">← Prev</button>
            <button id="todayBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition tooltip" data-tooltip="Jump to Today" aria-label="Jump to Today">Today</button>
            <button id="nextMonth" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition tooltip" data-tooltip="Next Month" aria-label="Next Month">Next →</button>
        </div>
        <div class="bg-white dark:bg-gray-800 p-4 rounded-lg shadow-lg mb-6 overflow-y-auto max-h-[60vh] animate-slide-in">
            <h2 id="monthYear" class="text-center text-lg font-semibold mb-4"></h2>
            <div id="calendar" class="grid grid-cols-7 gap-2"></div>
        </div>
        <div class="input-section glass p-4 rounded-lg shadow-lg mb-6 animate-slide-in">
            <h3 id="inputLabel" class="text-lg font-semibold mb-2"></h3>
            <div class="flex mb-4">
                <input type="number" id="pagesInput" min="0" placeholder="Pages studied" class="flex-grow p-2 border rounded-l-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600" aria-label="Enter pages studied">
                <button id="submitPages" class="bg-blue-600 text-white px-4 rounded-r-lg hover:bg-blue-700 transition" aria-label="Submit pages">Submit</button>
            </div>
            <button id="undoLast" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition" aria-label="Undo last entry">Undo Last Entry</button>
            <div class="mt-4 flex items-center">
                <label class="mr-2">Enable Adaptive Plan:</label>
                <input type="checkbox" id="adaptiveMode" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded" aria-label="Enable adaptive study plan">
            </div>
            <div class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-2">
                <p>Total Pages Studied: <span id="totalPages">0</span>/763</p>
                <p>Pages Remaining: <span id="pagesRemaining">763</span></p>
                <p>Progress: <span id="progressPercent">0%</span></p>
                <p>Avg. Pages/Day: <span id="avgPages">0</span></p>
                <p>Estimated Completion: <span id="completionDate">N/A</span> <span id="completionWarning" class="text-red-500 hidden">⚠ Falling behind!</span></p>
            </div>
            <p class="mt-2">Current Plan: <span id="currentPlan"></span></p>
            <div class="mt-4">
                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2.5">
                    <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>
        <div class="test-section glass p-4 rounded-lg shadow-lg mb-6 animate-slide-in">
            <h3 class="text-lg font-semibold mb-2">Practice Test Scores</h3>
            <div class="flex flex-wrap gap-2 mb-4">
                <input type="number" id="mathScore" min="200" max="800" placeholder="Math (200-800)" class="w-32 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700" aria-label="Math score">
                <input type="number" id="readingScore" min="200" max="800" placeholder="Reading (200-800)" class="w-32 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700" aria-label="Reading score">
                <input type="number" id="writingScore" min="200" max="800" placeholder="Writing (200-800)" class="w-32 p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700" aria-label="Writing score">
                <button id="submitTest" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition" aria-label="Submit test scores">Submit Test</button>
            </div>
            <p class="text-sm">Focus Area: <span id="focusArea">None</span></p>
            <div class="mt-2">
                <h4 class="text-sm font-semibold">Recent Tests:</h4>
                <ul id="testLog" class="text-sm space-y-2"></ul>
            </div>
        </div>
        <footer class="text-center mt-auto">
            <p class="text-gray-600 dark:text-gray-400">Goal: 763 pages by March 31, 2025</p>
        </footer>
    </div>

    <script>
        // Initialize state
        let currentDate = new Date();
        let selectedDate = new Date();
        let totalPages = 0;
        let pagesRemaining = 763;
        let studyPlan = { summerPages: 8, schoolPages: 1, weekendPages: 3 };
        let progress = {};
        let entryLog = [];
        let testLog = [];
        let adaptiveMode = false;

        // Load state from localStorage
        function loadState() {
            try {
                const savedProgress = localStorage.getItem('satProgress');
                if (savedProgress) progress = JSON.parse(savedProgress);

                const savedEntryLog = localStorage.getItem('satEntryLog');
                if (savedEntryLog) entryLog = JSON.parse(savedEntryLog);

                const savedTestLog = localStorage.getItem('satTestLog');
                if (savedTestLog) testLog = JSON.parse(savedTestLog);

                const savedStudyPlan = localStorage.getItem('satStudyPlan');
                if (savedStudyPlan) studyPlan = JSON.parse(savedStudyPlan);

                const savedTotalPages = localStorage.getItem('satTotalPages');
                if (savedTotalPages) totalPages = parseInt(savedTotalPages);

                const savedPagesRemaining = localStorage.getItem('satPagesRemaining');
                if (savedPagesRemaining) pagesRemaining = parseInt(savedPagesRemaining);

                const savedSelectedDate = localStorage.getItem('satSelectedDate');
                if (savedSelectedDate) selectedDate = new Date(savedSelectedDate);

                const savedCurrentDate = localStorage.getItem('satCurrentDate');
                if (savedCurrentDate) currentDate = new Date(savedCurrentDate);

                adaptiveMode = localStorage.getItem('satAdaptiveMode') === 'true';
                document.getElementById('adaptiveMode').checked = adaptiveMode;

                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                }
            } catch (e) {
                console.error('Failed to load state:', e);
                alert('Error loading your progress. Resetting to defaults.');
            }
        }

        // Save state to localStorage
        function saveState() {
            localStorage.setItem('satProgress', JSON.stringify(progress));
            localStorage.setItem('satEntryLog', JSON.stringify(entryLog));
            localStorage.setItem('satTestLog', JSON.stringify(testLog));
            localStorage.setItem('satStudyPlan', JSON.stringify(studyPlan));
            localStorage.setItem('satTotalPages', totalPages);
            localStorage.setItem('satPagesRemaining', pagesRemaining);
            localStorage.setItem('satSelectedDate', selectedDate.toISOString());
            localStorage.setItem('satCurrentDate', currentDate.toISOString());
            localStorage.setItem('satAdaptiveMode', adaptiveMode);
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }

        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            const monthYear = document.getElementById('monthYear');
            calendar.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            monthYear.textContent = `${currentDate.toLocaleString('default', { month: 'long' })} ${year}`;

            const daysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            daysOfWeek.forEach(day => {
                calendar.innerHTML += `<div class="calendar-day text-center p-2 bg-gray-200 dark:bg-gray-600 font-semibold rounded header-day">${day}</div>`;
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) {
                calendar.innerHTML += '<div class="calendar-day"></div>';
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const isBeforeStart = date < new Date(2024, 5, 13); // June 13, 2024
                const isSummer = date < new Date(2024, 7, 13); // August 13, 2024
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                const pages = isBeforeStart ? 0 : isSummer ? studyPlan.summerPages : (isWeekend ? studyPlan.weekendPages : studyPlan.schoolPages);
                const isCurrent = date.toDateString() === new Date().toDateString();
                const isSelected = date.toDateString() === selectedDate.toDateString();
                const isCompleted = progress[date.toDateString()];
                calendar.innerHTML += `
                    <div class="calendar-day text-center p-2 border rounded ${isCurrent ? 'current-day bg-blue-500 text-white' : ''} ${isCompleted ? 'completed-day bg-green-500 text-white' : ''} ${isSelected ? 'selected-day border-yellow-400' : ''} ${isBeforeStart ? 'disabled-day bg-gray-300 dark:bg-gray-600 cursor-not-allowed' : ''}" data-date="${date.toDateString()}" role="button" tabindex="${isBeforeStart ? '-1' : '0'}" aria-label="Day ${day}, ${pages} pages planned${isCompleted ? ', completed' : ''}${isCurrent ? ', today' : ''}${isSelected ? ', selected' : ''}">
                        <span>${day}</span>
                        ${!isBeforeStart ? `<span class="pages-text">${pages} pages</span>` : ''}
                        ${isCompleted ? `<br><button class="undo-btn mt-1 px-2 py-1 text-xs bg-gray-600 text-white rounded hover:bg-gray-700" data-date="${date.toDateString()}" aria-label="Undo entry for ${date.toDateString()}">Undo</button>` : ''}
                    </div>`;
            }
            document.getElementById('inputLabel').textContent = `Log Pages for ${selectedDate.toLocaleDateString()}`;
            document.getElementById('pagesInput').focus();
            updatePlan();
            updateStats();
            updateTestLog();
            attachDayListeners();
            attachUndoListeners();
            attachTestDeleteListeners();
        }

        function updatePlan() {
            document.getElementById('totalPages').textContent = totalPages;
            document.getElementById('pagesRemaining').textContent = pagesRemaining;
            document.getElementById('currentPlan').textContent = `Summer: ${studyPlan.summerPages} pages/day, School: ${studyPlan.schoolPages} page/day, Weekends: ${studyPlan.weekendPages} pages/day`;
            saveState();
        }

        function updateStats() {
            const progressPercent = ((totalPages / 763) * 100).toFixed(1);
            document.getElementById('progressPercent').textContent = `${progressPercent}%`;
            document.getElementById('progressBar').style.width = `${progressPercent}%`;
            const daysWithEntries = Object.keys(progress).length;
            const avgPages = daysWithEntries > 0 ? totalPages / daysWithEntries : 0;
            document.getElementById('avgPages').textContent = avgPages.toFixed(1);

            // Goal Forecasting
            const targetDate = new Date(2025, 2, 31); // March 31, 2025
            let completionDate = 'N/A';
            let showWarning = false;
            if (avgPages > 0) {
                const remainingDays = Math.ceil(pagesRemaining / avgPages);
                const estimatedDate = new Date();
                estimatedDate.setDate(estimatedDate.getDate() + remainingDays);
                completionDate = estimatedDate.toLocaleDateString();
                showWarning = estimatedDate > targetDate;
            }
            document.getElementById('completionDate').textContent = completionDate;
            document.getElementById('completionWarning').classList.toggle('hidden', !showWarning);
        }

        function updateTestLog() {
            const testLogEl = document.getElementById('testLog');
            testLogEl.innerHTML = testLog.slice(-3).map((test, index) => {
                const date = new Date(test.date).toLocaleDateString();
                const total = test.math + test.reading + test.writing;
                return `
                    <li class="border-b border-gray-300 dark:border-gray-600 py-2">
                        <div class="flex justify-between items-center">
                            <span>Test on ${date} (Total: ${total})</span>
                            <button class="delete-test-btn text-xs bg-red-600 text-white px-2 py-1 rounded hover:bg-red-700" data-index="${testLog.length - 1 - index}" aria-label="Delete test from ${date}">Delete</button>
                        </div>
                        <ul class="pl-4 text-xs">
                            <li>Math: ${test.math}</li>
                            <li>Reading: ${test.reading}</li>
                            <li>Writing: ${test.writing}</li>
                        </ul>
                    </li>`;
            }).join('');
            const latestTest = testLog[testLog.length - 1];
            if (latestTest) {
                const scores = { Math: latestTest.math, Reading: latestTest.reading, Writing: latestTest.writing };
                const focusArea = Object.keys(scores).reduce((a, b) => scores[a] < scores[b] ? a : b);
                document.getElementById('focusArea').textContent = `${focusArea} (Score: ${scores[focusArea]})`;
            } else {
                document.getElementById('focusArea').textContent = 'None';
            }
        }

        function attachTestDeleteListeners() {
            document.querySelectorAll('.delete-test-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = parseInt(btn.dataset.index);
                    testLog.splice(index, 1);
                    updateTestLog();
                    saveState();
                });
            });
        }

        function recalculatePlan() {
            const today = new Date();
            const summerEnd = new Date(2024, 7, 13); // August 13, 2024
            const endDate = new Date(2025, 2, 31); // March 31, 2025
            let summerDays = Math.max(0, Math.ceil((summerEnd - today) / (1000 * 60 * 60 * 24)));
            let remainingDays = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
            let schoolDays = 0, weekendDays = 0;

            if (today >= summerEnd) {
                summerDays = 0;
                schoolDays = Math.round(remainingDays * 5 / 7); // Approximate weekdays
                weekendDays = remainingDays - schoolDays;
            } else {
                const schoolPeriodDays = Math.ceil((endDate - summerEnd) / (1000 * 60 * 60 * 24));
                schoolDays = Math.round(schoolPeriodDays * 5 / 7);
                weekendDays = schoolPeriodDays - schoolDays;
            }

            if (pagesRemaining <= 0) {
                alert('Congratulations! You’ve completed the 763 pages!');
                return;
            }

            let performanceFactor = 1;
            if (adaptiveMode) {
                const daysWithEntries = Object.keys(progress).length;
                const avgPages = daysWithEntries > 0 ? totalPages / daysWithEntries : 0;
                const expectedAvg = (studyPlan.summerPages + studyPlan.schoolPages + studyPlan.weekendPages) / 3;
                performanceFactor = avgPages > 0 ? Math.min(Math.max(avgPages / expectedAvg, 0.8), 1.2) : 1;
            }

            // Base plan: 8 pages/day in summer, 1 page/day school, 3 pages/day weekends
            const totalSummerPages = summerDays * 8;
            const totalSchoolPages = schoolDays * 1;
            const totalWeekendPages = weekendDays * 3;
            let remainingPages = pagesRemaining - (totalSummerPages + totalSchoolPages + totalWeekendPages);

            if (remainingPages > 0) {
                // Distribute remaining pages
                const extraPerWeekendDay = Math.ceil(remainingPages / (weekendDays + summerDays));
                studyPlan.weekendPages = Math.max(3, 3 + extraPerWeekendDay);
                studyPlan.summerPages = summerDays > 0 ? Math.max(8, 8 + extraPerWeekendDay) : studyPlan.summerPages;
                studyPlan.schoolPages = 1;
            } else {
                studyPlan.summerPages = summerDays > 0 ? 8 : studyPlan.summerPages;
                studyPlan.schoolPages = 1;
                studyPlan.weekendPages = 3;
            }

            // Apply performance factor for adaptive mode
            studyPlan.summerPages = Math.round(studyPlan.summerPages * performanceFactor);
            studyPlan.schoolPages = Math.round(studyPlan.schoolPages * performanceFactor);
            studyPlan.weekendPages = Math.round(studyPlan.weekendPages * performanceFactor);

            renderCalendar();
        }

        function attachDayListeners() {
            document.querySelectorAll('.calendar-day:not(.disabled-day):not(.header-day)').forEach(day => {
                day.addEventListener('click', () => {
                    selectedDate = new Date(day.dataset.date);
                    renderCalendar();
                });
                day.addEventListener('keydown', e => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        selectedDate = new Date(day.dataset.date);
                        renderCalendar();
                    }
                });
            });
        }

        function attachUndoListeners() {
            document.querySelectorAll('.undo-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const date = btn.dataset.date;
                    const pages = progress[date] || 0;
                    totalPages -= pages;
                    pagesRemaining = Math.min(763, 763 - totalPages);
                    delete progress[date];
                    entryLog = entryLog.filter(entry => entry.date !== date);
                    recalculatePlan();
                });
            });
        }

        document.getElementById('submitPages').addEventListener('click', () => {
            const pages = parseInt(document.getElementById('pagesInput').value) || 0;
            if (pages < 0) {
                alert('Please enter a valid number of pages.');
                return;
            }
            totalPages += pages;
            pagesRemaining = Math.max(0, 763 - totalPages);
            progress[selectedDate.toDateString()] = (progress[selectedDate.toDateString()] || 0) + pages;
            entryLog.push({ date: selectedDate.toDateString(), pages });
            document.getElementById('pagesInput').value = '';
            recalculatePlan();
        });

        document.getElementById('undoLast').addEventListener('click', () => {
            if (entryLog.length === 0) {
                alert('No entries to undo.');
                return;
            }
            const lastEntry = entryLog.pop();
            totalPages -= lastEntry.pages;
            pagesRemaining = Math.min(763, 763 - totalPages);
            progress[lastEntry.date] = (progress[lastEntry.date] || 0) - lastEntry.pages;
            if (progress[lastEntry.date] <= 0) delete progress[lastEntry.date];
            recalculatePlan();
        });

        document.getElementById('submitTest').addEventListener('click', () => {
            const math = parseInt(document.getElementById('mathScore').value) || 0;
            const reading = parseInt(document.getElementById('readingScore').value) || 0;
            const writing = parseInt(document.getElementById('writingScore').value) || 0;
            if (math < 200 || math > 800 || reading < 200 || reading > 800 || writing < 200 || writing > 800) {
                alert('Please enter valid scores between 200 and 800.');
                return;
            }
            testLog.push({ date: new Date().toISOString(), math, reading, writing });
            document.getElementById('mathScore').value = '';
            document.getElementById('readingScore').value = '';
            document.getElementById('writingScore').value = '';
            updateTestLog();
            saveState();
        });

        document.getElementById('prevMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            const daysInNewMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            if (selectedDate.getDate() > daysInNewMonth) {
                selectedDate.setDate(daysInNewMonth);
            }
            selectedDate.setMonth(currentDate.getMonth());
            selectedDate.setFullYear(currentDate.getFullYear());
            renderCalendar();
        });

        document.getElementById('nextMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            const daysInNewMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            if (selectedDate.getDate() > daysInNewMonth) {
                selectedDate.setDate(daysInNewMonth);
            }
            selectedDate.setMonth(currentDate.getMonth());
            selectedDate.setFullYear(currentDate.getFullYear());
            renderCalendar();
        });

        document.getElementById('todayBtn').addEventListener('click', () => {
            currentDate = new Date();
            selectedDate = new Date();
            renderCalendar();
        });

        document.getElementById('adaptiveMode').addEventListener('change', () => {
            adaptiveMode = document.getElementById('adaptiveMode').checked;
            recalculatePlan();
            saveState();
        });

        // Swipe navigation
        let touchStartX = 0;
        const calendarContainer = document.querySelector('.bg-white.dark\\:bg-gray-800');
        calendarContainer.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });
        calendarContainer.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 30) document.getElementById('nextMonth').click();
            if (touchEndX > touchStartX + 30) document.getElementById('prevMonth').click();
        });

        // Dark mode toggle
        document.getElementById('toggleDarkMode').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            saveState();
        });

        // Initialize
        loadState();
        renderCalendar();
    </script>
</body>
</html>
