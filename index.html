<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StarCam 🌌 Ultimate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header><h1>StarCam 🌠</h1></header>
  <main>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="controls">
      <button id="captureBtn">📷 Capture</button>
      <button id="toggleStars">⭐ Stars</button>
      <button id="togglePlanets">🪐 Planets</button>
      <button id="toggleConstellations">✨ Constellations</button>
      <a id="downloadBtn" download="starcam.png">⬇️ Download</a>
    </div>
  </main>
  <script type="module" src="script.js"></script>
</body>
</html>
